name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test
      # dependencies are bundled by esbuild and pnpm's node_modules layout
      # cannot be scanned by vsce, so --no-dependencies is required
      - run: npx @vscode/vsce package --no-dependencies
      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --no-dependencies --packagePath ./*.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
      - name: Upload .vsix to the GitHub Release
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" ./*.vsix
        env:
          GH_TOKEN: ${{ github.token }}
